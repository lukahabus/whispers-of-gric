<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grička Sjena - Sjena Griča</title>
<style>
  :root{
    --bg:#0D1117;
    --panel:#1A2435;
    --panel2:#141c2b;
    --gold:#C9A84C;
    --gold-dim:#8c7531;
    --text:#EDE8DC;
    --text2:#9BAAB8;
    --gradec:#4A7FA5;
    --kaptol:#C05050;
    --marta:#C9A84C;
    --line: rgba(201,168,76,.45);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#05070b;color:var(--text);
    font-family: Georgia,'Times New Roman',Cambria,serif; overflow:hidden;}
  button{font-family:inherit;color:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:#0b0f17}
  ::-webkit-scrollbar-thumb{background:#2c3a52;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

  /* ---------- stage / scaling ---------- */
  #stage-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,#10151f 0%,#05070b 80%);}
  #stage{position:relative;width:1280px;height:720px;background:#05070b;
    box-shadow:0 0 60px rgba(0,0,0,.8), 0 0 0 1px #000;
    overflow:hidden;transform-origin:center center;}

  /* ---------- scene ---------- */
  #scene{position:absolute;inset:0;overflow:hidden;
    transition:opacity .5s ease; background:#06080d;}
  #scene-frame{position:absolute;left:0;width:100%;top:50%;transform:translateY(-50%);}
  #scene-frame.fill{top:0;transform:none;height:100%;}
  #scene-img{display:block;width:100%;}
  #scene-frame.fill #scene-img{width:100%;height:100%;object-fit:cover;object-position:center;}
  #scene-vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.5) 100%),
    linear-gradient(to bottom, rgba(6,8,13,.95) 0%, rgba(6,8,13,.35) 12%, transparent 26%, transparent 64%, rgba(6,8,13,.55) 82%, rgba(6,8,13,.96) 100%);}
  .hotspot{position:absolute;cursor:pointer;border:1px solid transparent;border-radius:6px;
    transition:background .2s,border-color .2s;}
  .hotspot:hover{background:rgba(201,168,76,.12);border-color:var(--line);
    box-shadow:0 0 18px rgba(201,168,76,.25) inset;}
  .hotspot .hs-label{position:absolute;left:50%;top:-30px;transform:translateX(-50%);
    background:rgba(10,14,22,.92);border:1px solid var(--line);color:var(--gold);
    font-size:13px;padding:3px 9px;white-space:nowrap;opacity:0;transition:opacity .15s;
    pointer-events:none;letter-spacing:.5px;border-radius:3px;}
  .hotspot:hover .hs-label{opacity:1;}
  .hotspot.glow{box-shadow:0 0 0 1px var(--line), 0 0 22px rgba(201,168,76,.35);
    animation:pulse 2.4s infinite ease-in-out;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 1px rgba(201,168,76,.25),0 0 12px rgba(201,168,76,.18)}
    50%{box-shadow:0 0 0 1px var(--line),0 0 26px rgba(201,168,76,.45)}}

  /* cursor when item selected */
  #stage.using{cursor:crosshair;}

  /* ---------- top HUD ---------- */
  #topbar{position:absolute;top:0;left:0;right:0;height:74px;z-index:30;
    display:flex;align-items:flex-start;justify-content:space-between;padding:10px 14px;
    background:linear-gradient(to bottom, rgba(5,7,11,.92), rgba(5,7,11,.0));pointer-events:none;}
  #topbar > *{pointer-events:auto;}
  #loc-box{max-width:300px;}
  #loc-name{font-size:20px;color:var(--gold);letter-spacing:1px;text-shadow:0 1px 4px #000;}
  #loc-quest{font-size:12.5px;color:var(--text2);margin-top:2px;}
  #loc-quest b{color:var(--text);font-weight:normal}

  #timer-box{display:flex;flex-direction:column;align-items:center;gap:2px;
    background:linear-gradient(#1c2436,#10151f);border:1px solid var(--line);
    padding:6px 22px;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.5);}
  #timer-label{font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;}
  #timer-row{display:flex;align-items:center;gap:8px;}
  #timer-cannon{font-size:18px;filter:sepia(1) saturate(2) hue-rotate(-10deg);}
  #timer-val{font-size:22px;color:var(--gold);letter-spacing:3px;font-variant-numeric:tabular-nums;}

  #navbtns{display:flex;gap:6px;}
  .nav{width:62px;background:rgba(20,28,43,.6);border:1px solid rgba(201,168,76,.25);
    color:var(--text2);font-size:10px;letter-spacing:1px;text-transform:uppercase;
    padding:6px 4px 4px;text-align:center;border-radius:3px;transition:all .15s;font-family:inherit;}
  .nav:hover{color:var(--gold);border-color:var(--line);background:rgba(30,40,60,.85);}
  .nav .ico{font-size:17px;display:block;margin-bottom:2px;line-height:1;}
  .nav .key{display:block;font-size:9px;opacity:.6;margin-top:2px;}

  /* ---------- bottom HUD ---------- */
  #bottombar{position:absolute;left:0;right:0;bottom:0;z-index:25;height:118px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding:10px 14px;
    background:linear-gradient(to top, rgba(5,7,11,.94), rgba(5,7,11,0));}
  .hud-panel{background:rgba(16,21,31,.82);border:1px solid rgba(201,168,76,.22);
    border-radius:5px;padding:8px 12px;backdrop-filter:blur(2px);}
  .hud-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);
    margin-bottom:6px;text-align:center;}

  #faction-panel{min-width:212px;}
  .fac-row{display:flex;align-items:center;gap:8px;margin:5px 0;}
  .fac-crest{width:26px;height:30px;flex:0 0 26px;}
  .fac-mid{flex:1;}
  .fac-name{font-size:11px;letter-spacing:1px;color:var(--text);}
  .fac-track{height:7px;background:#0a0e16;border:1px solid #2a3852;border-radius:4px;margin-top:3px;overflow:hidden;}
  .fac-fill{height:100%;width:0;transition:width .6s ease;border-radius:3px;}
  .fac-val{font-size:12px;color:var(--text2);width:34px;text-align:right;font-variant-numeric:tabular-nums;}

  #inv-panel{flex:0 0 auto;}
  #inv-slots{display:flex;gap:7px;}
  .slot{width:50px;height:50px;background:linear-gradient(#171f2e,#0e131d);
    border:1px solid rgba(201,168,76,.3);border-radius:5px;position:relative;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .slot:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(201,168,76,.3);}
  .slot.empty{cursor:default;border-color:rgba(201,168,76,.08);}
  .slot.empty:hover{box-shadow:none;border-color:rgba(201,168,76,.08);}
  .slot.sel{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.55);background:#222c3f;}
  .slot svg{width:38px;height:38px;}
  .slot .qty{position:absolute;right:2px;bottom:1px;font-size:10px;color:var(--gold);
    background:rgba(0,0,0,.6);padding:0 3px;border-radius:2px;}

  /* ---------- dialogue ---------- */
  #dialogue{position:absolute;left:0;right:0;bottom:0;z-index:40;display:none;
    padding:0 14px 12px;}
  #dlg-inner{display:flex;gap:0;align-items:stretch;}
  #dlg-portrait-wrap{flex:0 0 150px;position:relative;}
  #dlg-portrait{width:150px;height:182px;border:1px solid var(--line);border-bottom:none;
    background:#0a0e16;border-radius:6px 6px 0 0;overflow:hidden;}
  #dlg-portrait svg{width:100%;height:100%;display:block;}
  #dlg-main{flex:1;background:linear-gradient(rgba(30,22,40,.93),rgba(16,12,22,.95));
    border:1px solid var(--line);border-radius:0 6px 6px 0;padding:14px 18px;min-height:120px;
    display:flex;flex-direction:column;}
  #dlg-speaker{font-size:16px;letter-spacing:1px;margin-bottom:6px;}
  #dlg-text{font-style:italic;color:var(--text);font-size:16px;line-height:1.5;flex:1;}
  #dlg-choices{position:absolute;right:14px;bottom:18px;width:430px;display:flex;flex-direction:column;gap:7px;}
  .choice{background:linear-gradient(rgba(20,28,43,.92),rgba(13,18,28,.95));
    border:1px solid rgba(201,168,76,.3);color:var(--text);padding:10px 12px;font-size:14px;
    text-align:left;border-radius:4px;transition:all .15s;display:flex;gap:10px;align-items:center;}
  .choice:hover{border-color:var(--gold);background:rgba(40,52,74,.95);transform:translateX(-4px);}
  .choice .cnum{color:var(--gold);font-size:13px;border:1px solid var(--line);border-radius:3px;
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex:0 0 22px;}
  .choice .ctag{font-size:11px;color:var(--text2);font-style:italic;margin-left:auto;}
  #dlg-continue{position:absolute;right:26px;bottom:24px;color:var(--gold);font-size:24px;
    animation:bob 1.2s infinite;cursor:pointer;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

  /* ---------- overlay panels (journal/map/codex/inventory) ---------- */
  #overlay{position:absolute;inset:0;z-index:60;display:none;background:rgba(5,7,11,.86);
    padding:54px 60px;}
  #overlay-inner{height:100%;border:1px solid var(--line);border-radius:8px;
    background:linear-gradient(#10151f,#0b0f17);box-shadow:0 20px 60px rgba(0,0,0,.6);
    padding:24px 30px;position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .ov-corner{position:absolute;width:24px;height:24px;border:2px solid var(--gold-dim);}
  .c-tl{top:8px;left:8px;border-right:none;border-bottom:none}
  .c-tr{top:8px;right:8px;border-left:none;border-bottom:none}
  .c-bl{bottom:8px;left:8px;border-right:none;border-top:none}
  .c-br{bottom:8px;right:8px;border-left:none;border-top:none}
  #ov-title{font-size:26px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;
    border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px;flex:0 0 auto;}
  #ov-close{position:absolute;top:20px;right:26px;font-size:26px;color:var(--text2);
    background:none;border:none;line-height:1;z-index:5;}
  #ov-close:hover{color:var(--gold);}
  #ov-body{flex:1;overflow:auto;}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:26px;height:100%;}
  .col-h{font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;}
  .quest{border-left:2px solid var(--gold-dim);padding:6px 0 8px 12px;margin-bottom:12px;}
  .quest.done{border-color:#3c5a3c;opacity:.7;}
  .quest .qt{color:var(--gold);font-size:16px;margin-bottom:3px;}
  .quest.done .qt{color:#7fae7f;text-decoration:line-through;}
  .quest .qd{color:var(--text2);font-size:13.5px;line-height:1.45;}
  .theory{font-size:13.5px;color:var(--text2);padding:5px 0 5px 18px;position:relative;line-height:1.4;}
  .theory:before{content:'◇';position:absolute;left:0;color:var(--gold-dim);}
  .theory.struck{text-decoration:line-through;opacity:.55;}
  .theory.confirmed{color:var(--text);}
  .theory.confirmed:before{content:'◆';color:var(--gold);}

  /* relationships grid */
  .rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .rel-card{text-align:center;}
  .rel-portrait{width:88px;height:88px;border-radius:50%;margin:0 auto 8px;overflow:hidden;
    border:2px solid var(--line);background:#0a0e16;}
  .rel-portrait svg{width:100%;height:100%}
  .rel-name{font-size:15px;color:var(--text);}
  .rel-stat{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}

  /* codex list */
  .codex-list .cx{padding:10px 12px;border:1px solid rgba(201,168,76,.2);border-radius:4px;
    margin-bottom:8px;cursor:pointer;transition:all .15s;}
  .codex-list .cx:hover{border-color:var(--gold);background:rgba(30,40,60,.5);}
  .codex-list .cx .cxt{color:var(--gold);font-size:15px;}
  .codex-list .cx .cxd{color:var(--text2);font-size:12.5px;margin-top:3px;line-height:1.4;}

  /* inventory big */
  .inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .inv-cell{aspect-ratio:1;background:linear-gradient(#171f2e,#0e131d);
    border:1px solid rgba(201,168,76,.25);border-radius:5px;display:flex;align-items:center;
    justify-content:center;position:relative;cursor:pointer;transition:all .15s;}
  .inv-cell:hover{border-color:var(--gold);}
  .inv-cell.empty{cursor:default;border-color:rgba(201,168,76,.07)}
  .inv-cell.sel{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.5);background:#222c3f}
  .inv-cell svg{width:56px;height:56px}
  .inv-detail{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;min-height:120px;}
  .inv-detail h3{color:var(--gold);margin:0 0 6px;font-size:19px;letter-spacing:1px;}
  .inv-detail p{color:var(--text2);font-size:14px;line-height:1.5;margin:0 0 12px;}
  .combine-hint{color:var(--gold-dim);font-size:12.5px;font-style:italic;}

  /* map */
  #map-screen{position:relative;height:100%;background-size:cover;background-position:center;
    border-radius:6px;overflow:hidden;}
  .map-node{position:absolute;transform:translate(-50%,-50%);text-align:center;cursor:pointer;}
  .map-dot{width:20px;height:20px;border-radius:50%;background:var(--gold);
    border:2px solid #1a1206;margin:0 auto;box-shadow:0 0 14px rgba(201,168,76,.7);transition:transform .15s}
  .map-node:hover .map-dot{transform:scale(1.3)}
  .map-node.locked .map-dot{background:#444c5a;box-shadow:none;cursor:not-allowed}
  .map-node.current .map-dot{background:#fff;}
  .map-lbl{font-size:12px;color:var(--text);margin-top:4px;text-shadow:0 1px 4px #000,0 0 6px #000;white-space:nowrap;}
  .map-node.locked .map-lbl{color:var(--text2)}

  /* generic buttons */
  .btn{background:linear-gradient(rgba(20,28,43,.95),rgba(13,18,28,.98));
    border:1px solid var(--line);color:var(--text);padding:10px 16px;font-size:14px;
    border-radius:4px;transition:all .15s;letter-spacing:1px;}
  .btn:hover{border-color:var(--gold);background:rgba(40,52,74,.95);color:var(--gold)}
  .btn.gold{border-color:var(--gold);color:var(--gold)}

  /* ---------- toast ---------- */
  #toast-wrap{position:absolute;top:84px;left:50%;transform:translateX(-50%);z-index:55;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
  .toast{background:rgba(13,18,28,.95);border:1px solid var(--line);color:var(--text);
    padding:9px 18px;border-radius:4px;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.5);
    animation:toastIn .3s ease, toastOut .4s ease 2.6s forwards;max-width:560px;text-align:center;}
  .toast .ti{color:var(--gold);}
  @keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
  @keyframes toastOut{to{opacity:0;transform:translateY(-12px)}}

  /* ---------- examine modal ---------- */
  #examine{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(5,7,11,.7);}
  #examine-box{max-width:560px;background:linear-gradient(#16202f,#0d121b);border:1px solid var(--line);
    border-radius:6px;padding:26px 30px;box-shadow:0 20px 60px rgba(0,0,0,.7);position:relative;}
  #examine-box h3{color:var(--gold);margin:0 0 10px;font-size:20px;letter-spacing:1px;}
  #examine-box p{color:var(--text);font-size:15.5px;line-height:1.6;font-style:italic;margin:0 0 18px;}
  #examine-box .btn{float:right;}

  /* ---------- title / menu ---------- */
  #titlescreen{position:absolute;inset:0;z-index:80;background-size:cover;background-position:center;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:70px;}
  #titlescreen .tdim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,7,11,.2),rgba(5,7,11,.85));}
  #titlescreen .tcontent{position:relative;text-align:center;}
  #title-sub{color:var(--text2);letter-spacing:6px;font-size:14px;text-transform:uppercase;margin-bottom:22px;text-shadow:0 2px 8px #000;}
  .menu-btn{display:block;width:280px;margin:9px auto;background:rgba(13,18,28,.7);
    border:1px solid var(--line);color:var(--text);padding:13px;font-size:17px;letter-spacing:2px;
    border-radius:4px;transition:all .2s;}
  .menu-btn:hover{background:rgba(40,30,20,.85);border-color:var(--gold);color:var(--gold);letter-spacing:3px;}
  .menu-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* hidden object */
  #ho-screen{position:absolute;inset:0;z-index:45;display:none;background:#05070b;}
  #ho-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
  #ho-list{position:absolute;top:14px;left:14px;z-index:3;background:rgba(10,14,22,.86);
    border:1px solid var(--line);border-radius:6px;padding:12px 16px;min-width:190px;}
  #ho-list h4{margin:0 0 8px;color:var(--gold);font-size:13px;letter-spacing:2px;text-transform:uppercase;}
  #ho-list .hoi{font-size:14.5px;color:var(--text);padding:3px 0;}
  #ho-list .hoi.found{text-decoration:line-through;color:#5f6d7d;}
  .ho-target{position:absolute;cursor:pointer;z-index:2;}
  .ho-hit{position:absolute;border-radius:50%;border:2px solid var(--gold);
    box-shadow:0 0 20px rgba(201,168,76,.7);animation:found .6s ease;pointer-events:none;}
  @keyframes found{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}
  #ho-exit{position:absolute;top:14px;right:14px;z-index:3;}
  #ho-feedback{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:3;
    color:var(--text2);font-size:13px;font-style:italic;}

  /* candle puzzle */
  .candle-row{display:flex;justify-content:center;gap:26px;margin:18px 0;}
  .candle{text-align:center;cursor:pointer;width:96px;}
  .candle .flame{font-size:34px;height:42px;line-height:42px;filter:grayscale(1) brightness(.5);transition:all .3s;}
  .candle.lit .flame{filter:none;text-shadow:0 0 16px #ffb347;animation:flick 1.5s infinite;}
  @keyframes flick{0%,100%{opacity:1}50%{opacity:.82}}
  .candle .body{width:18px;height:60px;background:linear-gradient(#e8e0c8,#b9ad8a);margin:0 auto;border-radius:3px 3px 0 0;}
  .candle .cnum2{color:var(--gold);margin-top:6px;font-size:14px;}
  .candle .note{font-size:12px;color:var(--text2);font-style:italic;margin-top:6px;line-height:1.35;min-height:48px;}
  .candle:hover .body{box-shadow:0 0 14px rgba(201,168,76,.4)}

  .center-narr{max-width:680px;margin:0 auto;text-align:center;}
  .center-narr p{font-size:16px;line-height:1.7;color:var(--text);font-style:italic;}

  /* ending */
  #ending{position:absolute;inset:0;z-index:85;display:none;background:#05070b;
    background-size:cover;background-position:center;}
  #ending .edim{position:absolute;inset:0;background:linear-gradient(rgba(5,7,11,.55),rgba(5,7,11,.92));}
  #ending .ec{position:relative;max-width:720px;margin:0 auto;padding:80px 30px;text-align:center;}
  #ending h1{font-size:40px;color:var(--gold);letter-spacing:4px;margin-bottom:8px;}
  #ending .esub{color:var(--text2);letter-spacing:3px;text-transform:uppercase;font-size:13px;margin-bottom:26px;}
  #ending p{font-size:17px;line-height:1.7;color:var(--text);margin-bottom:18px;}

  .small{font-size:12px;color:var(--text2)}
  .gold{color:var(--gold)}
</style>
</head>
<body>
<div id="stage-wrap">
  <div id="stage">
    <div id="scene"><div id="scene-frame"><img id="scene-img" alt=""></div></div>
    <div id="scene-vignette"></div>

    <!-- TOP HUD -->
    <div id="topbar">
      <div id="loc-box" class="">
        <div id="loc-name">-</div>
        <div id="loc-quest"></div>
      </div>
      <div id="timer-box">
        <div id="timer-label">Grički top puca za</div>
        <div id="timer-row"><span id="timer-cannon">🜲</span><span id="timer-val">06:00</span></div>
      </div>
      <div id="navbtns">
        <button class="nav" data-panel="journal"><span class="ico">📖</span>Dnevnik<span class="key">J</span></button>
        <button class="nav" data-panel="map"><span class="ico">🗺️</span>Karta<span class="key">M</span></button>
        <button class="nav" data-panel="inventory"><span class="ico">🎒</span>Inventar<span class="key">I</span></button>
        <button class="nav" data-panel="codex"><span class="ico">📜</span>Kodeks<span class="key">K</span></button>
        <button class="nav" data-panel="menu"><span class="ico">⚙</span>Izbornik<span class="key">Esc</span></button>
      </div>
    </div>

    <!-- BOTTOM HUD -->
    <div id="bottombar">
      <div id="faction-panel" class="hud-panel">
        <div class="hud-title">Položaj kod frakcija</div>
        <div class="fac-row">
          <svg class="fac-crest" id="crest-gradec" viewBox="0 0 26 30"></svg>
          <div class="fac-mid">
            <div class="fac-name">GRADEC</div>

/* ---- helpers ---- */
const $ = s=>document.querySelector(s);
function fac(f){return G.factions[f];}
function facAdd(f,n){
  G.factions[f]=Math.max(0,Math.min(100,G.factions[f]+n));
  renderFactions();
  if(n>0) toast(`<span class='ti'>${f==='gradec'?'Gradec':'Kaptol'} ${n>0?'+':''}${n}</span>`);
  else if(n<0) toast(`${f==='gradec'?'Gradec':'Kaptol'} ${n}`);
}
function rel(npc,status){G.relationships[npc]=status;}
function hasItem(id){return G.inventory.includes(id);}
function addItem(id){ if(!hasItem(id)){G.inventory.push(id); toast(`<span class='ti'>Dobiveno:</span> ${ITEMS[id].name}`);} renderInventory(); }
function removeItem(id){ G.inventory=G.inventory.filter(x=>x!==id); renderInventory(); }
function unlockCodex(id){ if(CODEX[id]&&!G.codex.includes(id)){G.codex.push(id); toast(`<span class='ti'>Kodeks:</span> ${CODEX[id].title}`);} }
function addJournal(qid){ if(!G.journal.find(q=>q.id===qid)){ G.journal.push({id:qid,done:false}); toast(`<span class='ti'>Nova misija:</span> ${QUESTS[qid].title}`);} }
function completeJournal(qid){ const q=G.journal.find(q=>q.id===qid); if(q&&!q.done){q.done=true; toast(`<span class='ti'>Misija završena:</span> ${QUESTS[qid].title}`);} }
function addTheory(text,confirmed){ if(!G.theories.find(t=>t.text===text)){G.theories.push({text,confirmed:!!confirmed});} }

/* =====================================================================
   RENDER
   ===================================================================== */
function renderScene(){
  const sc = SCENES[G.scene];
  const scene = $("#scene");
  const frame = $("#scene-frame");
  scene.style.opacity=0;
  setTimeout(()=>{
    frame.className = (sc.mode==='band') ? 'band' : 'fill';
    if(sc.mode==='band'){
      const by = (sc.bandY!=null) ? sc.bandY : 50;
      frame.style.top = by+'%';
      frame.style.transform = 'translateY(-50%)';
    } else {
      frame.style.top = '';
      frame.style.transform = '';
    }
    const img = $("#scene-img");
    img.src = encodeURI(sc.bg);
    img.style.objectPosition = (sc.mode==='band') ? 'center' : (sc.bgPos||'center');
    scene.style.opacity=1;
    // hotspots (positioned relative to the art frame)
    [...frame.querySelectorAll('.hotspot')].forEach(h=>h.remove());
    sc.hotspots.forEach(hs=>{
      const el=document.createElement('div');
      el.className='hotspot'+(hs.glow&&hs.glow()?' glow':'');
      el.style.left=hs.x+'%'; el.style.top=hs.y+'%'; el.style.width=hs.w+'%'; el.style.height=hs.h+'%';
      el.innerHTML=`<span class='hs-label'>${hs.label}</span>`;
      el.onclick=(e)=>{ e.stopPropagation(); handleHotspot(hs); };
      frame.appendChild(el);
    });
  },180);
  // top bar
  $("#loc-name").textContent = sc.name;
  $("#loc-quest").innerHTML = "<b>Cilj:</b> "+ (typeof sc.quest==='function'?sc.quest():sc.quest||"");
}

function handleHotspot(hs){
  // using an item?
  if(selectedItem){
    tryUseOn(selectedItem, hs); 
    return;
  }
  if(hs.cond && !hs.cond()){ toast(hs.denied||"Ne možeš to sada."); return; }
  if(hs.type==='dialogue'){ openDialogue(hs.dialogue); return; }
  if(hs.type==='transition'){ go(hs.to); return; }
  if(hs.type==='examine'){ examine(hs.label, hs.text); return; }
  if(hs.action){ hs.action(); return; }
}

function go(sceneId){
  G.scene=sceneId; selectedItem=null; renderInventory(); renderScene(); autosave();
}

function renderInventory(){
  const bar=$("#inv-slots"); bar.innerHTML="";
  const max=Math.max(4, G.inventory.length);
  for(let i=0;i<Math.min(8,Math.max(4,G.inventory.length));i++){
    const id=G.inventory[i];
    const slot=document.createElement('div');
    if(id){
      slot.className='slot'+(selectedItem===id?' sel':'');
      slot.innerHTML=ITEMS[id].icon+`<span class='qty'>1</span>`;
      slot.title=ITEMS[id].name;
      slot.onclick=()=>selectItem(id);
    } else {
      slot.className='slot empty';
    }
    bar.appendChild(slot);
  }
}
let selectedItem=null;
function selectItem(id){
  if(selectedItem===id){ selectedItem=null; $("#stage").classList.remove('using'); toast("Predmet odložen."); }
  else { selectedItem=id; $("#stage").classList.add('using'); toast(`Odabrano: ${ITEMS[id].name}. Klikni cilj ili spoji s drugim predmetom.`); }
  renderInventory();
}

function renderFactions(){
  $("#val-gradec").textContent=G.factions.gradec;

  $("#fill-gradec").style.width=G.factions.gradec+'%';

/* =====================================================================
   COMBINE / USE
   ===================================================================== */
const COMBOS=[
  {a:"iron_key",b:"kaptol_blueprint",result:"second_key",msg:"Po tlocrtu skuješ drugu bradicu. Nastaje Drugi ključ."},
  {a:"blank_parchment",b:"wax_seal",result:"copied_letter",consume:true,
    cond:()=>true,
    msg:"Utiskuješ kaptolski pečat u pergament. Krivotvoreno pismo je gotovo."}
];
function tryCombine(a,b){
  const c=COMBOS.find(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a));
  if(!c){ toast("Ta dva predmeta ne idu zajedno."); return false; }
  if(c.cond && !c.cond()){ toast("Još nije vrijeme za to."); return false; }
  removeItem(c.a); removeItem(c.b); addItem(c.result);
  examine("Spojeno", c.msg);
  if(c.result==="copied_letter") addJournal("forge_chain");
  selectedItem=null; $("#stage").classList.remove('using'); renderInventory();
  renderOverlayInventory();
  return true;
}

const USES=[
  {item:"copied_letter",scene:"kaptol_int",hotspot:"stjepan",run(){ openDialogue("stjepan_intro"); }},
];
function tryUseOn(item, hs){
  // combine if clicking another inventory hotspot -- handled elsewhere
  selectedItem=null; $("#stage").classList.remove('using'); renderInventory();
  // crypt door with keys
  if(hs.id==='crypt_door' && (item==='second_key'||item==='iron_key')){ hs.action(); return; }
  if(hs.id==='fireplace'){ hs.action(); return; }
  if(hs.id==='guard' && (item==='guard_badge'||item==='city_coin')){ openDialogue("guard_bridge"); return; }
  if(hs.id==='stjepan' && item==='copied_letter'){ openDialogue("stjepan_intro"); return; }
  const u=USES.find(u=>u.item===item && u.hotspot===hs.id);
  if(u){ u.run(); return; }
  toast(`${ITEMS[item].name} ne djeluje na: ${hs.label}.`);
}

   DIALOGUE ENGINE
   ===================================================================== */
let DLG=null;
function openDialogue(id){
  const d=DIALOGUES[id];
  if(!d){return;}
  if(d.cond && !d.cond()){ toast("Ta osoba ne želi sada razgovarati."); return; }
  DLG={def:d,node:d.start};
  $("#dialogue").style.display="block";
  $("#bottombar").style.display="none";
  showNode();
}
function showNode(){
  const d=DLG.def, n=d.nodes[DLG.node];
  if(n.effect) { n.effect(); renderFactions(); }
  const sp=SPEAKERS[d.speaker];
  $("#dlg-portrait").innerHTML=`<img src="${(d.portrait?d.portrait():sp.portrait)}" style="width:100%;height:100%;object-fit:cover">`;
  $("#dlg-speaker").textContent=sp.name;
  $("#dlg-speaker").style.color=sp.color;
  $("#dlg-text").textContent= typeof n.text==='function'?n.text():n.text;
  const cbox=$("#dlg-choices"); cbox.innerHTML="";
  $("#dlg-continue").style.display="none";
  if(n.end){
    const b=document.createElement('button');
    b.className='choice'; b.innerHTML=`<span class='cnum'>✕</span> [Kraj razgovora]`;
    b.onclick=closeDialogue; cbox.appendChild(b);
    return;
  }
  const choices=(n.choices||[]).filter(c=>!c.cond||c.cond());
  let num=1;
  choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice';
    const tagged = /^\[/.test(c.t);
    b.innerHTML=`<span class='cnum'>${num++}</span> ${c.t}`;
    b.onclick=()=>chooseDialogue(c);
    cbox.appendChild(b);
  });
}
function chooseDialogue(c){
  if(c.effect){c.effect(); renderFactions();}
  if(c.next){ DLG.node=c.next; showNode(); }
  else closeDialogue();
}
function closeDialogue(){
  $("#dialogue").style.display="none";
  $("#bottombar").style.display="flex";
  DLG=null; renderScene(); autosave();
}

let ovSelected=null, ovCombineFirst=null;

let HOstate=null;
function startHO(id){
  const def=HO[id];
  HOstate={id,def,found:[]};
  $("#ho-bg").style.backgroundImage=`url("${def.bg}")`;
  $("#ho-feedback").textContent=def.intro;
  const list=$("#ho-items"); list.innerHTML="";
  def.items.forEach(it=>{
    const row=document.createElement('div'); row.className='hoi'; row.id="hoi-"+it.id;
    row.textContent="• "+it.name; list.appendChild(row);
  });
  // place clickable targets
  [...document.querySelectorAll('.ho-target')].forEach(e=>e.remove());
  def.items.forEach(it=>{
    const t=document.createElement('div'); t.className='ho-target'; t.id="hot-"+it.id;
    t.style.left=it.x+'%'; t.style.top=it.y+'%'; t.style.width='6%'; t.style.height='9%';
    t.onclick=()=>foundHO(it);
    $("#ho-screen").appendChild(t);
  });
  $("#ho-screen").style.display="block";
}
function foundHO(it){
  if(HOstate.found.includes(it.id)) return;
  HOstate.found.push(it.id);
  $("#hoi-"+it.id).classList.add('found');
  const t=$("#hot-"+it.id);
  const hit=document.createElement('div'); hit.className='ho-hit';
  hit.style.left=t.style.left; hit.style.top=t.style.top; hit.style.width='6%'; hit.style.height='9%';
  $("#ho-screen").appendChild(hit); setTimeout(()=>hit.remove(),700);
  t.onclick=null;
  $("#ho-feedback").textContent=`Pronađeno: ${it.name} (${HOstate.found.length}/${HOstate.def.items.length})`;
  if(HOstate.found.length===HOstate.def.items.length){ setTimeout(finishHO,700); }
}
function finishHO(){
  const def=HOstate.def;
  $("#ho-screen").style.display="none";
  [...document.querySelectorAll('.ho-target')].forEach(e=>e.remove());
  if(def.reward) addItem(def.reward);
  if(def.bonus) addItem(def.bonus);
  if(def.done) def.done();
  // chain bookkeeping
  if(def.bonus==='wax_seal'||def.reward==='second_ledger'){ /* forge materials */ }
  if(def.bonus==='guard_badge'){ addJournal("guard_chain"); }
  HOstate=null; renderScene(); autosave();
  examine(def.title+" - gotovo", "Pronašao si sve. "+(def.reward?("Dobiveno: "+ITEMS[def.reward].name+(def.bonus?(" i "+ITEMS[def.bonus].name):"")+"."):""));
}
$("#ho-exit").onclick=()=>{ $("#ho-screen").style.display="none"; [...document.querySelectorAll('.ho-target')].forEach(e=>e.remove()); HOstate=null; };

    if(av) b.onclick=()=>showEnding(e.id);
    body.appendChild(b);
  });
  ov.style.display="block";
}

const ENDING_TEXT={
  diplomat:{title:"DIPLOMAT",sub:"Tiha pravda",bg:IMG.bridge,
    body:`<p>Ogrlica se vraća bez riječi. Pravi krivac - onaj komu je rat donosio vlast - tiho nestaje iz grada, premješten daleko od Griča.</p>
      <p>Gradec i Kaptol nastavljaju mrziti se kao i prije, ali bez krvi. Most ostaje cijel.</p>
      <p>Oni koji znaju istinu, znaju i tvoje ime - i preziru te zbog šutnje. Ali Zagreb spava. Zasad.</p>`},
  reckoning:{title:"OBRAČUN",sub:"Istina po cijenu mira",bg:IMG.nero,
    body:`<p>Na sredini mosta podižeš kopirano pismo, ledger i kriptni dokaz. Glasovi se dižu. Kaptol i Gradec okreću se jedan protiv drugoga - i protiv onih u sjeni koji su ih huškali.</p>
      <p>Sukob plamti. Ali Martino ime - i ime Dorotee Kovačić - napokon su rehabilitirani. Tri stoljeća laži gore zajedno s mostom.</p>
      <p>Pravda je glasna. I skupa.</p>`},
  witch:{title:"VJEŠTIČIN DOGOVOR",sub:"Mir s mrtvima",bg:BG.crypt_candles,
    body:`<p>Vraćaš pravu ogrlicu u sarkofag, među pet svijeća. Druga svijeća - Dorotejina - gori najjače.</p>
      <p>Marta se pojavljuje posljednji put. "Ispunio si tri niti," kaže. "Grad neće znati istinu, ali kamen će je pamtiti - i ja s njim."</p>
      <p>Istraga se zatvara bez krivca. Nema pobjede ni za Gradec ni za Kaptol. Samo tišina, i jedan plamen koji više nikad neće dogorjeti.</p>`},
  leave:{title:"TIHI ODLAZAK",sub:"Stranac odlazi",bg:IMG.cover,
    body:`<p>Prije nego top zapuca, već si na cesti izvan zidina. Pisma, ključevi, dokazi - sve ostaje za tobom.</p>
      <p>Grad gori malo bez tebe - ali gori. Negdje iza, na Lotrščaku, plamen svijeće ne miče se na vjetru.</p>
      <p>Neke sjene nije tvoje da rasvijetliš.</p>`}
};
function showEnding(id){
  $("#overlay").style.display="none";
  const e=ENDING_TEXT[id];
  const end=$("#ending");
  end.style.backgroundImage=`url("${e.bg.startsWith('data:')?e.bg:encodeURI(e.bg)}")`;
  $("#end-title").textContent=e.title;
  $("#end-sub").textContent=e.sub;
  $("#end-body").innerHTML=e.body+`<p class='small' style='margin-top:24px'>Gradec ${G.factions.gradec} · Kaptol ${G.factions.kaptol} · Teorija potvrđenih: ${G.theories.filter(t=>t.confirmed).length}</p>`;
  end.style.display="block";
  localStorage.removeItem('gricka_save');
}
$("#end-restart").onclick=()=>{ $("#ending").style.display="none"; showTitle(); };

/* =====================================================================
   MENU / SAVE / LOAD
   ===================================================================== */
function openMenu(){
  const ov=$("#overlay"); $("#ov-title").textContent="Izbornik";
  const body=$("#ov-body"); body.innerHTML="";
  const box=document.createElement('div'); box.className='center-narr';
  box.innerHTML=`<p>Grička Sjena</p><p class='small'>Tvoj napredak se sprema automatski.</p>`;
  const mk=(label,fn)=>{const b=document.createElement('button');b.className='btn';b.style.margin='8px';b.textContent=label;b.onclick=fn;return b;};
  const row=document.createElement('div'); row.style.textAlign='center'; row.style.marginTop='20px';
  row.appendChild(mk("Spremi igru",()=>{autosave();toast("Igra spremljena.");}));
  row.appendChild(mk("Nastavi",()=>$("#overlay").style.display="none"));
  row.appendChild(mk("Glavni izbornik",()=>{$("#overlay").style.display="none";showTitle();}));
  box.appendChild(row);
  body.appendChild(box);
  ov.style.display="block";
}
function autosave(){ try{ localStorage.setItem('gricka_save',JSON.stringify(G)); }catch(e){} }
function loadSave(){ try{ const s=localStorage.getItem('gricka_save'); if(s){G=JSON.parse(s); return true;} }catch(e){} return false; }

/* =====================================================================
   TITLE SCREEN
   ===================================================================== */
function showTitle(){
  $("#titlescreen").style.backgroundImage=`url("${encodeURI(IMG.cover)}")`;
  $("#titlescreen").style.display="flex";
  $("#btn-continue").disabled = !localStorage.getItem('gricka_save');
}
let topTimer=null;
function fmtTime(s){ const m=Math.floor(s/60), ss=s%60; return String(m).padStart(2,'0')+":"+String(ss).padStart(2,'0'); }
function startTopTimer(){
  if(topTimer) clearInterval(topTimer);
  $("#timer-val").textContent=fmtTime(G.topSeconds);
  topTimer=setInterval(()=>{
    if(G.scene==null) return;
    if(DLG||HOstate||$("#overlay").style.display==="block") return; // pause during menus/dialogue
    G.topSeconds--;
    if(G.topSeconds<=0){ G.topSeconds=0; clearInterval(topTimer);
      $("#timer-val").textContent="06:00"; toast("<span class='ti'>Grički top!</span> Jutro se budi nad Gričem."); return; }
    $("#timer-val").textContent=fmtTime(G.topSeconds);
  },1000);
}
function startGame(fresh){
  if(fresh || !loadSave()){ G=newState(); }
  if(typeof G.topSeconds!=='number') G.topSeconds=9*60+47;
  $("#titlescreen").style.display="none";
  $("#bottombar").style.display="flex";
  renderFactions(); renderInventory(); renderScene(); startTopTimer();
  toast("Zagreb, 1599. Top kuca prema zori.");
}
$("#btn-new").onclick=()=>{ localStorage.removeItem('gricka_save'); startGame(true); };
$("#btn-continue").onclick=()=>{ if(loadSave()) startGame(false); };
$("#btn-about").onclick=()=>{
  examine("O igri","Grička Sjena (Sjena Griča) - 2D point-and-click murder mystery smješten u Zagreb 1599. Istraga, dijalozi, frakcije Gradec i Kaptol, skriveni predmeti, zagonetke svijeća i četiri završetka. Sve nacrtano u jednoj HTML datoteci.");
};

/* =====================================================================
   NAV + KEYS + SCALING
   ===================================================================== */
document.querySelectorAll('.nav').forEach(b=>{
  b.onclick=()=>{ if(DLG)return; openPanel(b.dataset.panel); };
});
document.addEventListener('keydown',e=>{
  if($("#titlescreen").style.display!=="none"&&$("#titlescreen").style.display!=="") return;
  const k=e.key.toLowerCase();
  if(k==='escape'){ 
    if($("#examine").style.display==="flex"){$("#examine").style.display="none";return;}
    if($("#overlay").style.display==="block"){$("#overlay").style.display="none";return;}
    if(DLG){return;}
    openMenu(); return;
  }
  if(DLG){
    const n=DLG.def.nodes[DLG.node];
    if(!n.end && n.choices){
      const choices=n.choices.filter(c=>!c.cond||c.cond());
      const idx=parseInt(k)-1;
      if(idx>=0&&idx<choices.length){ chooseDialogue(choices[idx]); }
    } else if(n.end && (k==='enter'||k===' ')){ closeDialogue(); }
    return;
  }
  if($("#overlay").style.display==="block") return;
  if(k==='j')openPanel('journal');
  if(k==='m')openPanel('map');
  if(k==='i')openPanel('inventory');
  if(k==='k')openPanel('codex');
});

function scaleStage(){
  const s=$("#stage"); const pad=0;
  const sx=(window.innerWidth-pad)/1280, sy=(window.innerHeight-pad)/720;
  const sc=Math.min(sx,sy);
  s.style.transform=`scale(${sc})`;
}
window.addEventListener('resize',scaleStage);
scaleStage();

/* boot */
showTitle();
</script>
</body>
</html>
